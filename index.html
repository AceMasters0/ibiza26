  @keyframes kenburns {
    0%   { transform: scale(1.08) translate(0, 0); }
    100% { transform: scale(1.18) translate(-2%, -1%); }
  }
  .bg-overlay {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(180deg, rgba(10,4,24,0.55) 0%, rgba(10,4,24,0.45) 35%, rgba(10,4,24,0.65) 100%);
  }

  /* PINNED HEADER — fixed, always on top */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 14px 16px 12px;
    box-sizing: border-box;
    padding-top: max(14px, env(safe-area-inset-top));
    background: linear-gradient(180deg, rgba(10,4,24,0.92) 0%, rgba(10,4,24,0.78) 70%, rgba(10,4,24,0) 100%);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
  }
  .header-inner {
    max-width: 540px;
    margin: 0 auto;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 40px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #fff;
    text-shadow: 0 2px 30px rgba(0,0,0,0.4);
    display: inline-block;
  }
  .brand .yr {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    background: linear-gradient(135deg, #ffb84d 0%, #ff5e8a 50%, #c084fc 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-left: 4px;
    letter-spacing: -0.01em;
    vertical-align: super;
    font-size: 22px;
  }
  .dates {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.22em; color: rgba(255,255,255,0.85);
    text-transform: uppercase; font-weight: 500;
    text-shadow: 0 1px 10px rgba(0,0,0,0.4);
  }
  .dates .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #c4ff00;
    box-shadow: 0 0 8px #c4ff00; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }

  .app {
    max-width: 540px;
    margin: 0 auto;
    padding: 14px 12px 60px;
    padding-top: 90px;
    box-sizing: border-box;
    width: 100%;
  }

  .card {
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px;
    margin-bottom: 10px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 8px 24px rgba(0,0,0,0.35), 0 24px 70px rgba(0,0,0,0.25);
    overflow: hidden;
    transition: background 0.3s ease;
    position: relative;
  }
  .card.open { background: rgba(255,255,255,0.14); }

  /* JS-driven pinned header for the open day. When .pinned is added,
     we render a fixed clone strip at the top of the viewport. */
  .day.open .day-head { transition: opacity 0.15s ease; }

  /* The floating pinned bar — a fixed element rendered separately by JS */
  .pinned-bar {
    position: fixed;
    left: 0; right: 0;
    z-index: 50;
    padding: 0 16px;
    pointer-events: none;
    transform: translateY(-100%);
    transition: transform 0.25s cubic-bezier(0.2,0.9,0.3,1);
  }
  .pinned-bar.show {
    transform: translateY(0);
  }
  .pinned-bar-inner {
    max-width: 540px;
    margin: 0 auto;
    background: rgba(28, 14, 44, 0.78);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.14);
    border-bottom: 1px solid rgba(255,255,255,0.20);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    cursor: pointer;
    pointer-events: auto;
  }

  /* Weather pinned-on-load state — sits right under the fixed header until user scrolls */
  .card.weather.pin-on-load {
    position: fixed;
    left: 16px;
    right: 16px;
    top: var(--header-h, 70px);
    max-width: 508px; /* 540 - 32 padding */
    margin: 0 auto;
    z-index: 40;
    transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.2,0.9,0.3,1);
  }
  .card.weather.pin-on-load.releasing {
    opacity: 0;
    transform: translateY(-8px);
  }

  /* WEATHER CARD — 2-column, white background, taller */
  .card.weather {
    background: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.4);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    padding: 0;
    display: grid;
    grid-template-columns: minmax(0, 0.85fr) 1px minmax(0, 1.15fr);
    align-items: stretch;
    min-height: 213px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 24px 70px rgba(0,0,0,0.20);
    overflow: hidden;
  }
  .w-left, .w-right {
    padding: 22px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
    min-width: 0;
  }
  .w-left { padding-left: 14px; padding-right: 10px; }
  .w-right { padding-left: 18px; padding-right: 18px; }
  .w-divider {
    width: 1px;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(0,0,0,0.10) 20%,
      rgba(0,0,0,0.10) 80%,
      transparent 100%);
  }
  .w-left {
    align-items: center;
    text-align: center;
  }
  .w-condition {
    font-size: 17px;
    font-weight: 500;
    color: #2a2a3a;
    letter-spacing: 0.02em;
  }
  .w-icon-wrap {
    width: 96px;
    height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: float 4s ease-in-out infinite;
  }
  .w-icon-wrap svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 4px 12px rgba(100,120,160,0.25));
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-6px); }
  }
  .w-loc {
    font-size: 17px;
    font-weight: 600;
    color: #1a1a2a;
    letter-spacing: 0.01em;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .w-day {
    font-size: 12px;
    font-weight: 600;
    color: #6a6a80;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: -4px;
  }
  .w-temp-big {
    font-size: 56px;
    font-weight: 500;
    color: #1a1a2a;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-top: 8px;
    white-space: nowrap;
  }
  .w-temp-big .deg {
    font-size: 28px;
    font-weight: 400;
    margin-left: 2px;
    color: #6a6a80;
  }
  .w-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a8aa0;
    font-weight: 600;
    margin-top: 6px;
  }
  .w-meta-row span { white-space: nowrap; }
  .w-meta-row b { color: #1a1a2a; font-weight: 700; font-size: 12px; letter-spacing: 0.02em; }

  /* DAY HEAD — no logos, just date + vibe + title + chevron */
  .day-head {
    display: grid;
    grid-template-columns: 56px 1fr 20px;
    gap: 14px;
    align-items: center;
    padding: 16px 20px;
    cursor: pointer; user-select: none;
  }
  .day-num .num { font-size: 32px; font-weight: 500; line-height: 1; letter-spacing: -0.02em; color: #fff; }
  .day-num .dow { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 600; margin-top: 4px; }
  .day-info { min-width: 0; }
  .day-vibe { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #6dd5d5; font-weight: 600; margin-bottom: 3px; }
  .day-title { font-size: 16px; font-weight: 500; color: #fff; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chev { color: rgba(255,255,255,0.5); font-size: 12px; transition: transform 0.3s ease; text-align: right; }
  .day.open .chev { transform: rotate(180deg); color: #fff; }

  .day-body { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.2,0.9,0.3,1); }
  .day.open .day-body { max-height: 9000px; }
  .day-inner { padding: 0 12px 12px; }

  .segment {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    padding: 18px 16px 16px;
    margin-bottom: 8px;
    backdrop-filter: blur(8px);
  }
  .segment:last-child { margin-bottom: 0; }
  .segment.allday {
    /* Highlight the special all-day birthday segment */
    background: linear-gradient(135deg, rgba(255,184,77,0.18) 0%, rgba(255,94,138,0.14) 100%);
    border: 1px solid rgba(255,184,77,0.35);
    text-align: center;
  }

  .seg-kind {
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,255,255,0.55); font-weight: 600; margin-bottom: 6px;
    text-align: center;
  }
  .seg-vibe {
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #6dd5d5; font-weight: 600; margin-bottom: 14px;
    text-align: center;
  }

  /* LOGO area — centered + big */
  .seg-logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 90px;
    margin-bottom: 14px;
    padding: 8px 0;
  }
  .seg-logo-wrap.tall { min-height: 200px; }
  .seg-logo-wrap.taller { min-height: 150px; }
  .seg-logo {
    max-width: 80%;
    max-height: 90px;
    width: auto; height: auto;
    object-fit: contain;
  }
  /* Per-logo size overrides */
  .seg-logo.size-2x { max-height: 180px; max-width: 95%; }
  .seg-logo.size-15x { max-height: 135px; max-width: 90%; }
  /* Dark-on-transparent logos (HÏ, Beso, Nobu, Beachouse) → invert so they read on dark glass */
  .seg-logo.invert {
    filter: invert(1) brightness(1.05);
  }
  /* Colored-on-transparent logos (Cipriani burgundy) → lighten to a warm gold */

  .decks-label {

// Smart open: attempt the app, fall back to the web after a short delay.
function openTikTok(query) {
  // Direct navigation: iOS prompts to open in TikTok app. Accept = app opens.
  // Back button returns to this page. If app not installed, fall back to web after timeout.
  const start = Date.now();
  const fallbackTimer = setTimeout(() => {
    if (Date.now() - start < 2000 && !document.hidden) {
      window.location.href = ttWeb(query);
    }
  }, 1500);
  const onHide = () => {
    if (document.hidden) {
      clearTimeout(fallbackTimer);
      document.removeEventListener('visibilitychange', onHide);
    }
  };
  document.addEventListener('visibilitychange', onHide);
  window.location.href = ttApp(query);
}

// Launch a native app via custom scheme without navigating away from this page.
// Strategy: hidden iframe trick. Setting iframe.src to a custom-scheme URL triggers iOS/Android
// to offer to open the app, but the parent page never navigates. If the app opens, the page
// loses visibility (user is in app). If after a delay the page is still visible, the app
// didn't open — we then navigate to the web URL in the same tab as a fallback.
let _launchIframe = null;
function launchAppOrWeb(appUrl, webUrl) {
  if (!_launchIframe) {
    _launchIframe = document.createElement('iframe');
    _launchIframe.style.cssText = 'display:none; width:0; height:0; border:0; position:absolute;';
    document.body.appendChild(_launchIframe);
  }
  const start = Date.now();
  let appOpened = false;

  // If page becomes hidden quickly, app launched — do nothing.
  const onVis = () => {
    if (document.hidden) {
      appOpened = true;
      document.removeEventListener('visibilitychange', onVis);
    }
  };
  document.addEventListener('visibilitychange', onVis);

  // Try the app via iframe (no parent navigation)
  try {
    _launchIframe.src = appUrl;
  } catch (e) { /* ignore */ }

  // After a beat, if app didn't open, fall through to web in the SAME tab.
  // We use 1.2s — long enough for iOS prompt to appear & user to accept,
  // short enough that if they decline / no app, we don't leave them hanging.
  setTimeout(() => {
    document.removeEventListener('visibilitychange', onVis);
    if (!appOpened && !document.hidden && Date.now() - start < 2500) {
      // No app launched — open web fallback in same tab
      window.location.href = webUrl;
    }
  }, 1200);
}

const daysEl = document.getElementById('days');

const LOGO_SIZES = { pacha: '2x', bluemarlin: '15x' };
function renderLogo(s) {
  // Real transparent logo
  if (s.logoKey && LOGOS[s.logoKey]) {
    const mode = NEEDS_BLEND[s.logoKey];
    const size = LOGO_SIZES[s.logoKey];
    let cls = '';
    if (mode === 'invert') cls = ' invert';
    else if (mode === 'lighten') cls = ' lighten';
    if (size) cls += ' size-' + size;
    const wrapCls = size === '2x' ? ' tall' : (size === '15x' ? ' taller' : '');
    return `<div class="seg-logo-wrap${wrapCls}"><img class="seg-logo${cls}" src="${LOGOS[s.logoKey]}" alt=""></div>`;
  }
  // Text mark fallback (Cala Jondal, Charter, Saul's Birthday)
  if (s.textMark) {
    return `<div class="seg-logo-wrap"><div class="seg-text-mark">${s.textMark.name}<span class="sub">${s.textMark.sub}</span></div></div>`;
  }
  return '';
}

function renderDay(day) {
  const dayEl = document.createElement('div');

    dayEl.innerHTML = `
      <div class="day-head">

        <div class="day-info">

          <div class="day-title">${day.title}</div>
        </div>
        <div></div>

  const segmentsHTML = (day.segments || []).map(s => {
    const timeHTML = s.allDay
      ? `<div class="seg-time allday">All Day</div>`
      : `<div class="seg-time">${s.timeIn}<span class="arr">→</span>${s.timeOut}</div>`;
    // Saul's birthday (allDay) gets no walk button — it's a vibe, not a destination
    const showWalk = !s.allDay && s.walk;
    const buttons = [];
    if (showWalk) {
      buttons.push(`<a class="btn" href="${walk(s.walk)}" target="_blank" rel="noopener">
        <span class="ic">🚶</span><span>Walk</span>

    if (s.tt) {

    }
    if (s.ytQuery || s.ytUrl) {
      const isSet = s.dj && !/Resident|Sound System|Live/.test(s.dj);
      let ytTarget;
      if (s.ytUrl) {
        ytTarget = s.ytUrl;  // direct video URL
      } else {
        ytTarget = isSet ? s.ytQuery : (s.ytQuery + ' music');
      }
      ytTarget = ytTarget.replace(/'/g, "\\'");
      buttons.push(`<button type="button" class="btn btn-yt" onclick="openYouTube('${ytTarget}')">
        <span class="ic">▶</span><span>${isSet ? 'Set' : 'Vibe'}</span>

  return dayEl;
}

// ============== ACCORDION + SCROLL FIX ==============
// Bug fix: jump issue on 14/15. Cause: scroll target computed before transition
// completed, so card height is wrong → wrong target → page lands wrong.
// Fix: wait for the transition end of THIS card before computing scroll.

const allDays = daysEl.querySelectorAll('.day');

function scrollToDay(dayEl) {
  const headerH = document.querySelector('.header').offsetHeight;
  const SPACING = 5;
  let y = 0;
  let el = dayEl;
  while (el) { y += el.offsetTop; el = el.offsetParent; }
  smoothScrollTo(y - headerH - SPACING);
}

// Custom smooth scroll with nice ease-out curve (~480ms)
let _scrollAnim = null;
function smoothScrollTo(targetY) {
  if (_scrollAnim) cancelAnimationFrame(_scrollAnim);
  const startY = window.scrollY;
  const distance = targetY - startY;
  if (Math.abs(distance) < 2) { window.scrollTo(0, targetY); return; }
  const duration = Math.min(700, Math.max(380, Math.abs(distance) * 0.45));
  const startT = performance.now();
  // Ease out cubic
  const ease = (t) => 1 - Math.pow(1 - t, 3);
  function step(now) {
    const elapsed = now - startT;
    const t = Math.min(1, elapsed / duration);
    window.scrollTo(0, startY + distance * ease(t));
    if (t < 1) {
      _scrollAnim = requestAnimationFrame(step);
    } else {
      _scrollAnim = null;
    }
  }
  _scrollAnim = requestAnimationFrame(step);
}

allDays.forEach(dayEl => {
  if (dayEl.classList.contains('travel')) return;
  const head = dayEl.querySelector('.day-head');
  head.addEventListener('click', () => {
    const wasOpen = dayEl.classList.contains('open');

    // Collapse all other open cards INSTANTLY (no animation) so layout settles before scroll.
    // This is the fix for the jump bug: if we let them animate-collapse over 500ms while
    // scrolling, the target offsetTop changes mid-scroll and the page lands wrong.
    allDays.forEach(d => {
      if (d !== dayEl && d.classList.contains('open')) {
        const body = d.querySelector('.day-body');
        // Disable transition, snap closed
        body.style.transition = 'none';
        d.classList.remove('open');
        // Force a reflow
        void body.offsetHeight;
        // Re-enable transition for future opens
        body.style.transition = '';
      }
    });

    if (!wasOpen) {
      dayEl.classList.add('open');
      // After the .open class is applied, the body will animate from 0 → max-height.
      // But we don't need to wait — the day-HEAD position is stable now (everything else collapsed).
      // Scroll on next frame using stable offsetTop.
      requestAnimationFrame(() => scrollToDay(dayEl));
    } else {
      dayEl.classList.remove('open');
    }
  });
});

// Auto-open today's date if it's during the trip; otherwise collapse all.
// Also: on day-of, pin the weather card at the top of the screen until first scroll.
(function autoOpenToday(){
  const today = new Date();
  const tripStart = new Date(2026, 4, 12); // May = month 4
  const tripEnd   = new Date(2026, 4, 18, 23, 59, 59);
  const isDuringTrip = today >= tripStart && today <= tripEnd;

  if (isDuringTrip) {
    const dayNum = String(today.getDate());
    let openedDay = null;
    for (const d of allDays) {
      const numEl = d.querySelector('.day-num .num');
      if (numEl && numEl.textContent.trim() === dayNum && !d.classList.contains('travel')) {
        d.classList.add('open');
        openedDay = d;
        break;
      }
    }

    // Pin the weather card at the top on load
    const weatherCard = document.querySelector('.card.weather');
    if (weatherCard) {
      // Remember its original position so we can release cleanly later
      weatherCard.classList.add('pin-on-load');

      // On first user scroll: release the pin (return to natural flow)
      let released = false;
      const release = () => {
        if (released) return;
        released = true;
        weatherCard.classList.add('releasing');
        // After fade animation, remove the fixed positioning entirely
        setTimeout(() => {
          weatherCard.classList.remove('pin-on-load', 'releasing');
        }, 320);
        window.removeEventListener('scroll', onAnyScroll);
        window.removeEventListener('wheel', onAnyScroll);
        window.removeEventListener('touchmove', onAnyScroll);
      };
      const onAnyScroll = () => release();
      window.addEventListener('scroll', onAnyScroll, { passive: true });
      window.addEventListener('wheel', onAnyScroll, { passive: true });
      window.addEventListener('touchmove', onAnyScroll, { passive: true });
    }

    // Defer day scroll until layout finalizes
    if (openedDay) {
      setTimeout(() => scrollToDay(openedDay), 100);
    }
    return;
  }
  // Otherwise: all closed (default)
})();

// ============== PINNED OPEN-DAY BAR ==============
// Tracks the currently-open day; renders a fixed bar at the top of the viewport
// when the user has scrolled past the day's natural head position.
const pinnedBar = document.getElementById('pinnedBar');
const pinnedBarInner = document.getElementById('pinnedBarInner');
let _pinnedTargetDay = null;

function getOpenDay() {
  return daysEl.querySelector('.day.open');
}

function updatePinnedBar() {
  const openDay = getOpenDay();
  if (!openDay) {
    pinnedBar.classList.remove('show');
    return;
  }
  const headerH = document.querySelector('.header').offsetHeight;
  const headRect = openDay.querySelector('.day-head').getBoundingClientRect();
  const cardRect = openDay.getBoundingClientRect();

  // Show pinned bar when the original head has scrolled above the (fixed) page header,
  // AND the card itself is still in view (bottom hasn't passed above the header).
  const headOutOfView = headRect.bottom <= headerH;
  const cardStillInView = cardRect.bottom > headerH + 40;

  if (headOutOfView && cardStillInView) {
    if (_pinnedTargetDay !== openDay) {
      // Render the bar contents — clone of the day-head's relevant info
      const dayNum = openDay.querySelector('.day-num .num').textContent;
      const dayDow = openDay.querySelector('.day-num .dow').textContent;
      const dayVibe = openDay.querySelector('.day-vibe').textContent;
      const dayTitle = openDay.querySelector('.day-title').textContent;
      pinnedBarInner.innerHTML = `
        <div class="day-head">
          <div class="day-num"><div class="num">${dayNum}</div><div class="dow">${dayDow}</div></div>
          <div class="day-info">
            <div class="day-vibe">${dayVibe}</div>
            <div class="day-title">${dayTitle}</div>
          </div>
          <div class="chev" style="transform: rotate(180deg);">▼</div>
        </div>`;
      _pinnedTargetDay = openDay;
      // Clicking the pinned bar collapses & scrolls back to the original head
      pinnedBarInner.onclick = () => {
        openDay.classList.remove('open');
        pinnedBar.classList.remove('show');
        // Scroll up to where the head used to be
        smoothScrollTo(window.scrollY + cardRect.top - headerH - 5);
      };
    }
    // Position the pinned bar directly under the page header
    pinnedBar.style.top = headerH + 'px';
    pinnedBar.classList.add('show');
  } else {
    pinnedBar.classList.remove('show');
    _pinnedTargetDay = null;
  }
}

window.addEventListener('scroll', updatePinnedBar, { passive: true });
window.addEventListener('resize', updatePinnedBar);

const W_CODE_MAP = {
  0:['Clear Sky', 'sun'], 1:['Mainly Clear', 'sun'],
  2:['Partly Cloudy', 'partly'], 3:['Overcast', 'cloud'],
  45:['Foggy', 'fog'], 48:['Foggy', 'fog'],
  51:['Light Drizzle', 'rain'], 53:['Drizzle', 'rain'], 55:['Heavy Drizzle', 'rain'],
  61:['Light Rain', 'rain'], 63:['Rain', 'rain'], 65:['Heavy Rain', 'rain'],
  80:['Passing Showers', 'rain'], 81:['Showers', 'rain'], 82:['Heavy Showers', 'storm'],
  95:['Thunderstorm', 'storm'], 96:['Storm', 'storm'], 99:['Severe Storm', 'storm']
};

function renderHourly(hourly) {
  const scroll = document.getElementById('hourlyScroll');
  const card = document.getElementById('hourlyCard');
  if (!scroll || !card) return;
  scroll.innerHTML = '';

  // Find the index closest to "now" in Ibiza time
  const ibizaNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Madrid' }));
  const nowMs = ibizaNow.getTime();

  // Each entry in hourly.time is an ISO timestamp like "2026-05-07T15:00"
  let nowIdx = 0;
  let bestDiff = Infinity;
  for (let i = 0; i < hourly.time.length; i++) {
    const t = new Date(hourly.time[i]).getTime();
    const diff = Math.abs(t - nowMs);
    if (diff < bestDiff) { bestDiff = diff; nowIdx = i; }
  }

  // Take next 24 hours starting from current hour
  const startIdx = nowIdx;
  const endIdx = Math.min(hourly.time.length, startIdx + 24);

  for (let i = startIdx; i < endIdx; i++) {
    const isoTime = hourly.time[i];
    const temp = Math.round(hourly.temperature_2m[i]);
    const code = hourly.weather_code[i];
    const [, iconKey] = W_CODE_MAP[code] || ['Pleasant', 'partly'];

    // Format time: 3 PM, 4 PM, etc. or "Now" for the first cell
    let label;
    if (i === startIdx) {
      label = 'Now';
    } else {
      const dt = new Date(isoTime);
      let h = dt.getHours();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12; if (h === 0) h = 12;
      label = h + ' ' + ampm;
    }

    const cell = document.createElement('div');
    cell.className = 'hour' + (i === startIdx ? ' now' : '');
    cell.innerHTML = `
      <div class="hour-time">${label}</div>
      <div class="hour-icon">${W_ICONS[iconKey] || W_ICONS.partly}</div>
      <div class="hour-temp">${temp}°</div>
    `;
    scroll.appendChild(cell);
  }

  card.style.display = 'block';
}

// Render a sensible fallback so the cards are never empty even if the API is unreachable.
function renderWeatherFallback() {
  const ibizaNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Madrid' }));
  const dayName = ibizaNow.toLocaleDateString('en-US', { weekday: 'long' });
  document.getElementById('wTemp').textContent = '72';
  document.getElementById('wIconWrap').innerHTML = W_ICONS.partly;
  document.getElementById('wDesc').textContent = 'Mediterranean Sun';
  document.getElementById('wHigh').textContent = '75°';
  document.getElementById('wLow').textContent = '62°';
  document.getElementById('wWind').textContent = '8 MPH';
  document.getElementById('wDay').textContent = dayName;

  // Static hourly fallback — just show 24 hours of "partly cloudy 70°" so the card renders
  const scroll = document.getElementById('hourlyScroll');
  const card = document.getElementById('hourlyCard');
  if (scroll && card) {
    scroll.innerHTML = '';
    const startHour = ibizaNow.getHours();
    for (let i = 0; i < 24; i++) {
      const h24 = (startHour + i) % 24;
      let label;
      if (i === 0) {
        label = 'Now';
      } else {
        let h = h24 % 12; if (h === 0) h = 12;
        const ampm = h24 >= 12 ? 'PM' : 'AM';
        label = h + ' ' + ampm;
      }
      // Vary temps slightly across the day for realism: cooler at night, warmer midday
      let temp = 70;
      if (h24 >= 11 && h24 <= 16) temp = 74;
      else if (h24 >= 0 && h24 <= 6) temp = 64;
      const cell = document.createElement('div');
      cell.className = 'hour' + (i === 0 ? ' now' : '');
      cell.innerHTML = `
        <div class="hour-time">${label}</div>
        <div class="hour-icon">${W_ICONS.partly}</div>
        <div class="hour-temp">${temp}°</div>
      `;
      scroll.appendChild(cell);
    }
    card.style.display = 'block';
  }
}

// Render fallback immediately so users see something while we try to fetch live data
renderWeatherFallback();

async function loadWeather() {
  const url = 'https://api.open-meteo.com/v1/forecast?latitude=38.9067&longitude=1.4206&current=temperature_2m,wind_speed_10m,weather_code&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Europe%2FMadrid&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_hours=25';

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.current || !d.daily) throw new Error('Bad payload');

    const t = Math.round(d.current.temperature_2m);
    const code = d.current.weather_code;
    const wind = Math.round(d.current.wind_speed_10m);
    const hi = Math.round(d.daily.temperature_2m_max[0]);
    const lo = Math.round(d.daily.temperature_2m_min[0]);
    const codeMap = {
      0:['Clear Sky', W_ICONS.sun],
      1:['Mainly Clear', W_ICONS.sun],
      2:['Partly Cloudy', W_ICONS.partly],
      3:['Overcast', W_ICONS.cloud],
      45:['Foggy', W_ICONS.fog], 48:['Foggy', W_ICONS.fog],
      51:['Light Drizzle', W_ICONS.rain], 53:['Drizzle', W_ICONS.rain], 55:['Heavy Drizzle', W_ICONS.rain],
      61:['Light Rain', W_ICONS.rain], 63:['Rain', W_ICONS.rain], 65:['Heavy Rain', W_ICONS.rain],
      80:['Passing Showers', W_ICONS.rain], 81:['Showers', W_ICONS.rain], 82:['Heavy Showers', W_ICONS.storm],
      95:['Thunderstorm', W_ICONS.storm], 96:['Storm', W_ICONS.storm], 99:['Severe Storm', W_ICONS.storm]
    };
    const [desc, icon] = codeMap[code] || ['Pleasant', W_ICONS.partly];
    document.getElementById('wTemp').textContent = t;
    document.getElementById('wIconWrap').innerHTML = icon;
    document.getElementById('wDesc').textContent = desc;
    document.getElementById('wHigh').textContent = hi + '°';
    document.getElementById('wLow').textContent = lo + '°';
    document.getElementById('wWind').textContent = wind + ' MPH';
    const ibizaNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Madrid' }));
    document.getElementById('wDay').textContent = ibizaNow.toLocaleDateString('en-US', { weekday: 'long' });
    if (d.hourly && d.hourly.time && d.hourly.temperature_2m && d.hourly.weather_code) {
      renderHourly(d.hourly);
    }
    console.log('[weather] live data loaded');
  } catch (e) {
    console.warn('[weather] fetch failed, keeping fallback:', e);
    // Fallback already rendered above — leave it as-is
  }
}
loadWeather();

  document.querySelector('.app').style.paddingTop = (h + 10) + 'px';
  document.documentElement.style.setProperty('--header-h', (h + 5) + 'px');
}
updatePad();
